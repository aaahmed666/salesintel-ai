<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #E2E8F0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shimmer-button {
            position: relative;
            overflow: hidden;
        }
        .shimmer-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 40%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }
        .shimmer-button:hover::after {
            opacity: 1;
            left: 100%;
            top: 100%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 z-0 pointer-events-none">

</div>
<!-- Main Container -->
<div class="w-full max-w-[440px] z-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Logo / Header -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-[28px]" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Sales Intelligence</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">Enter your email to receive a recovery link for your account.</p>
</div>
<!-- Reset Card -->
<div class="glass-panel p-xl rounded-xl shadow-sm">
<form class="space-y-lg" id="forgot-password-form" onsubmit="handleSubmit(event)">
<!-- Email Input Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-[44px] pr-md py-md bg-transparent border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all font-body-md text-on-surface placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="shimmer-button w-full bg-gradient-to-r from-primary to-secondary text-on-primary py-md px-lg rounded-lg font-label-md text-label-md shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" id="submit-btn" type="submit">
<span id="btn-text">Send Reset Link</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" id="btn-icon">arrow_forward</span>
</button>
</form>
<!-- Success State (Hidden by default) -->
<div class="hidden text-center py-md animate-in fade-in zoom-in-95 duration-500" id="success-state">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mx-auto mb-lg text-primary">
<span class="material-symbols-outlined text-[32px]">mark_email_read</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-xs">Check your inbox</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-lg">We've sent a secure password reset link to your email address.</p>
<button class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4" onclick="resetForm()">Resend link</button>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-xl text-center space-y-md">
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-primary font-label-md text-label-md transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Back to Login
            </a>
<div class="pt-xl border-t border-outline-variant/30 flex justify-center gap-gutter">
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<span class="text-outline/30">•</span>
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>
<!-- Subtle Floating Visuals -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary/10 rounded-full blur-[100px] pointer-events-none"></div>
<script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const form = document.getElementById('forgot-password-form');
            const success = document.getElementById('success-state');

            // Simulate loading state
            btn.disabled = true;
            btnText.innerText = "Sending Request...";
            btnIcon.innerText = "autorenew";
            btnIcon.classList.add('animate-spin');

            setTimeout(() => {
                form.classList.add('hidden');
                success.classList.remove('hidden');
                
                // Add a micro-interaction to the success icon
                const successIcon = success.querySelector('.material-symbols-outlined');
                successIcon.style.transform = 'scale(0.5)';
                setTimeout(() => {
                    successIcon.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    successIcon.style.transform = 'scale(1)';
                }, 50);
            }, 1500);
        }

        function resetForm() {
            const form = document.getElementById('forgot-password-form');
            const success = document.getElementById('success-state');
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');

            success.classList.add('hidden');
            form.classList.remove('hidden');
            btn.disabled = false;
            btnText.innerText = "Send Reset Link";
            btnIcon.innerText = "arrow_forward";
            btnIcon.classList.remove('animate-spin');
        }

        // Initialize shader background behavior if needed or any extra layout tweaks
        window.addEventListener('DOMContentLoaded', () => {
            console.log('SalesForce AI Reset Password Loaded');
        });
    </script>
</body></html>
