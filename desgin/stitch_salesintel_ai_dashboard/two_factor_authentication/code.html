                        "surface-dim": "#cbdbf5",

                        "on-surface": "#0b1c30",
                        "primary": "#4648d4",
                        "on-secondary-container": "#fffbff",
                        "tertiary-fixed-dim": "#89ceff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "surface": "#f8f9ff",
                        "on-primary-fixed": "#07006c",
                        "primary-container": "#6063ee",
                        "secondary-fixed-dim": "#d0bcff",
                        "on-tertiary-container": "#fcfcff",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",

                        "inverse-surface": "#213145",

                    "fontFamily": {

<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-md overflow-hidden relative">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] animate-float"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px] animate-float" style="animation-delay: -3s;"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[480px]">
<!-- Brand Identity Section (Suppressed Shell per "Transactional" Rule) -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight text-center">Verify your identity</h1>
<p class="font-body-md text-on-surface-variant text-center mt-xs px-md">
                We've sent a 6-digit verification code to <span class="font-bold text-on-surface">j.****@enterprise.ai</span>
</p>
</div>
<!-- 2FA Card Container -->
<div class="glass-panel rounded-xl p-xl shadow-sm">
<form class="space-y-xl" id="otp-form">
<!-- OTP Inputs -->
<div class="flex justify-between gap-xs sm:gap-sm" id="otp-container">
<input autocomplete="one-time-code" class="otp-input w-full aspect-square text-center text-headline-md font-headline-md bg-surface-container-lowest border-outline-variant rounded-lg border-2 focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" pattern="\d*" required="" type="text"/>
<input class="otp-input w-full aspect-square text-center text-headline-md font-headline-md bg-surface-container-lowest border-outline-variant rounded-lg border-2 focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" pattern="\d*" required="" type="text"/>
<input class="otp-input w-full aspect-square text-center text-headline-md font-headline-md bg-surface-container-lowest border-outline-variant rounded-lg border-2 focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" pattern="\d*" required="" type="text"/>
<input class="otp-input w-full aspect-square text-center text-headline-md font-headline-md bg-surface-container-lowest border-outline-variant rounded-lg border-2 focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" pattern="\d*" required="" type="text"/>
<input class="otp-input w-full aspect-square text-center text-headline-md font-headline-md bg-surface-container-lowest border-outline-variant rounded-lg border-2 focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" pattern="\d*" required="" type="text"/>
<input class="otp-input w-full aspect-square text-center text-headline-md font-headline-md bg-surface-container-lowest border-outline-variant rounded-lg border-2 focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" pattern="\d*" required="" type="text"/>
</div>
<div class="space-y-md">
<button class="w-full bg-gradient-to-r from-primary to-secondary text-on-primary font-label-md text-label-md py-md rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
<span>Verify code</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="flex flex-col items-center gap-xs">
<p class="font-body-sm text-on-surface-variant">Didn't receive a code?</p>
<button class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4 transition-all" id="resend-btn" type="button">
                            Resend code
                        </button>
</div>
</div>
</form>
</div>
<!-- Footer Help Links -->
<div class="mt-xl flex justify-center items-center gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center gap-base" href="#">
<span class="material-symbols-outlined text-[16px]">help</span>
                Support center
            </a>
<div class="w-1 h-1 bg-outline-variant rounded-full"></div>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center gap-base" href="#">
<span class="material-symbols-outlined text-[16px]">logout</span>
                Cancel login
            </a>
</div>
</main>
<!-- Interactive Layer -->
<script>
        const inputs = document.querySelectorAll('.otp-input');
        const resendBtn = document.getElementById('resend-btn');

        // OTP Input Auto-focus logic
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric input
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Form Submission Micro-interaction
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> <span>Verifying...</span>`;
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span>Identity Verified</span>`;
                btn.classList.replace('from-primary', 'from-emerald-500');
                btn.classList.replace('to-secondary', 'to-emerald-600');
            }, 1500);
        });

        // Resend Timer logic
        resendBtn.addEventListener('click', () => {
            let seconds = 30;
            resendBtn.disabled = true;
            resendBtn.classList.add('text-on-surface-variant', 'no-underline');
            resendBtn.classList.remove('text-primary');

            const interval = setInterval(() => {
                resendBtn.innerText = `Resend available in ${seconds}s`;
                seconds--;
                if (seconds < 0) {
                    clearInterval(interval);
                    resendBtn.disabled = false;
                    resendBtn.innerText = 'Resend code';
                    resendBtn.classList.remove('text-on-surface-variant', 'no-underline');
                    resendBtn.classList.add('text-primary');
                }
            }, 1000);
        });
    </script>
</body></html>
