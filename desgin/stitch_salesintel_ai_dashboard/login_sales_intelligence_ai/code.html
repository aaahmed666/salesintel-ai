<style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8f9ff;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }
      .loading-spinner {
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top: 2px solid #ffffff;
        width: 16px;
        height: 16px;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-color: #f8f9ff;
        background-image: 
          radial-gradient(at 0% 0%, rgba(70, 72, 212, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(107, 56, 212, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(0, 124, 177, 0.05) 0px, transparent 50%),
          radial-gradient(at 0% 100%, rgba(132, 85, 239, 0.05) 0px, transparent 50%);
      }

<body class="flex items-center justify-center min-h-screen p-md">
<!-- Background Decoration -->
<div class="mesh-bg"></div>
<!-- Login Container -->
<div class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo & Branding Section (Shared Component Logic Inspired) -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-[28px]" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">SalesForce AI</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Enterprise Sales Intelligence Platform</p>
</div>
<!-- Main Card -->
<main class="glass-card rounded-xl p-lg shadow-xl shadow-on-surface/5">
<form class="space-y-lg" id="loginForm">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">mail</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">lock</span>
<input class="w-full pl-[44px] pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-4 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container hover:bg-secondary transition-all text-on-primary-container font-label-md text-label-md py-md rounded-lg flex items-center justify-center gap-sm shadow-md shadow-primary/10 active:scale-[0.98]" id="submitBtn" type="submit">
<span>Sign in to Dashboard</span>
<span class="loading-spinner hidden" id="loader"></span>
</button>
<!-- Social/SSO Divider -->
<div class="relative flex items-center gap-md py-xs">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline-variant uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- SSO Action -->
<button class="w-full bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-colors text-on-surface font-label-md text-label-md py-md rounded-lg flex items-center justify-center gap-sm" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Sign in with Google</span>
</button>
</form>
</main>
<!-- Footer Links -->
<p class="text-center mt-xl font-body-sm text-body-sm text-on-surface-variant">
            Don't have an account yet? 
            <a class="text-primary font-medium hover:underline" href="#">Start 14-day free trial</a>
</p>
<!-- Trust Badges / Footer Info -->
<div class="mt-xl flex justify-center items-center gap-xl opacity-40 grayscale">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]">verified_user</span>
<span class="font-label-sm text-label-sm uppercase tracking-tight">SOC2 Compliant</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
<span class="font-label-sm text-label-sm uppercase tracking-tight">AES-256 Encryption</span>
</div>
</div>
</div>
<!-- Client-side Interaction -->
<script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = submitBtn.querySelector('span:first-child');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI State Change: Loading
            submitBtn.disabled = true;
            btnText.textContent = 'Verifying...';
            loader.classList.remove('hidden');
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

            // Simulate Network Delay
            setTimeout(() => {
                // Success State (simulation)
                btnText.textContent = 'Success! Redirecting...';
                loader.classList.add('hidden');
                submitBtn.classList.replace('bg-primary-container', 'bg-green-600');
                
                setTimeout(() => {
                    // Logic for actual navigation would go here
                    console.log('Login logic complete.');
                    // Resetting for demo purposes if it wasn't a real redirect
                    // window.location.href = '/dashboard';
                }, 1000);
            }, 2000);
        });

        // Add subtle mouse move effect to background
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const mesh = document.querySelector('.mesh-bg');
            mesh.style.backgroundImage = `
                radial-gradient(at ${x * 10}% ${y * 10}%, rgba(70, 72, 212, 0.08) 0px, transparent 50%),
                radial-gradient(at ${100 - (x * 10)}% ${y * 10}%, rgba(107, 56, 212, 0.08) 0px, transparent 50%),
                radial-gradient(at ${100 - (x * 10)}% ${100 - (y * 10)}%, rgba(0, 124, 177, 0.08) 0px, transparent 50%),
                radial-gradient(at ${x * 10}% ${100 - (y * 10)}%, rgba(132, 85, 239, 0.08) 0px, transparent 50%)
            `;
        });
    </script>
</body></html>
